services:
  ghostteam-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GHOSTTEAM_WORKSPACE_DIR: /workspace/.ghostteam
      GHOSTTEAM_LOG: info
      GHOSTTEAM_GHOSTOS_ENDPOINT: ${GHOSTTEAM_GHOSTOS_ENDPOINT:-http://ghostos-bridge:9000/infer}
      GHOSTTEAM_GHOSTOS_MODEL: ${GHOSTTEAM_GHOSTOS_MODEL:-ghost-1}
      GHOSTTEAM_API_PORT: ${GHOSTTEAM_API_PORT:-8080}
    volumes:
      - ghostteam-workspace:/workspace/.ghostteam
    depends_on:
      - ghostos-bridge

  ghostos-bridge:
    image: python:3.12-slim
    working_dir: /app
    command: ["python", "/app/ghostos-bridge.py"]
    environment:
      GHOSTOS_UPSTREAM_URL: ${GHOSTOS_UPSTREAM_URL:-http://ghostos-real:8501/infer}
      GHOSTOS_BRIDGE_PORT: ${GHOSTOS_BRIDGE_PORT:-9000}
    volumes:
      - ./scripts/ghostos-bridge.py:/app/ghostos-bridge.py:ro
    ports:
      - "9000:9000"
    depends_on:
      - ghostos-real

  ghostos-real:
    image: python:3.12-slim
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "pip install --no-cache-dir ghostos && ghostos web ghostos.demo.agents.jojo --server.address 0.0.0.0 --server.port 8501"
      ]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_PROXY: ${OPENAI_PROXY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
    ports:
      - "8501:8501"
    volumes:
      - ghostos-workspace:/workspace

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama

volumes:
  ghostteam-workspace:
  ollama-data:
  ghostos-workspace:
